<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Seven House</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🎮 Seven House</h1>

  <div id="login">
    <input type="text" id="nome" placeholder="Seu nome">
    <button onclick="entrar()">Entrar</button>
  </div>

  <div id="app" class="hidden">

    <h2 id="boasVindas"></h2>

    <div class="botoes">
      <button onclick="criarSala()">➕ Criar Sala</button>
      <button onclick="ganharPontos()">🏆 +10 pontos</button>
    </div>

    <div class="box">
      <h3>Salas</h3>
      <ul id="salas"></ul>
    </div>

    <div class="box">
      <h3>Ranking</h3>
      <ul id="ranking"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
